<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MindDump</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0f0f13;
        --surface: #1a1a22;
        --surface-2: #22222e;
        --accent: #5ef5c0;
        --text: #e8e8f0;
        --text-muted: #6b6b80;
        --danger: #f55e7a;
        --border: #2a2a38;
        --radius: 12px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        font-family: "DM Sans", system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      #app {
        max-width: 860px;
        margin: 0 auto;
        min-height: 100dvh;
        padding: 16px 16px 86px;
      }

      .top-title {
        margin: 0 0 14px;
        font-weight: 600;
        letter-spacing: 0.2px;
      }

      .screen {
        display: none;
      }

      .screen.active {
        display: block;
      }

      .placeholder {
        border: 1px dashed var(--border);
        border-radius: var(--radius);
        color: var(--text-muted);
        padding: 20px;
        background: var(--surface);
      }

      .cats-wrap {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 12px;
      }

      .cat-row {
        border: 1px solid var(--border);
        border-radius: 10px;
        margin-bottom: 10px;
        background: var(--surface-2);
        overflow: hidden;
      }

      .cat-header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px;
      }

      .accordion-btn {
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text-muted);
        border-radius: 8px;
        width: 28px;
        height: 28px;
        cursor: pointer;
      }

      .dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        flex-shrink: 0;
      }

      .cat-name {
        font-weight: 500;
        flex: 1;
      }

      .icon-btn {
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface);
        color: var(--text);
        padding: 5px 8px;
        cursor: pointer;
      }

      .icon-btn.danger {
        color: var(--danger);
      }

      .cat-body {
        padding: 0 10px 10px 42px;
      }

      .topic-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 8px;
      }

      .topic-name {
        flex: 1;
        color: #d6d6e4;
      }

      .btn {
        border: 1px solid var(--border);
        border-radius: 10px;
        background: var(--surface);
        color: var(--text);
        cursor: pointer;
        padding: 9px 12px;
      }

      .btn.ghost {
        background: transparent;
      }

      .btn.accent {
        color: var(--accent);
        border-color: var(--accent);
      }

      .btn.full {
        width: 100%;
      }

      .btn.link {
        padding: 0;
        border: 0;
        background: transparent;
        color: var(--accent);
      }

      .inline-form {
        margin-top: 10px;
        padding: 10px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: #15151d;
      }

      .input {
        width: 100%;
        background: var(--surface);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px;
        font: inherit;
      }

      .colors {
        margin-top: 10px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .color-btn {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        border: 2px solid transparent;
        cursor: pointer;
      }

      .color-btn.active {
        border-color: white;
      }

      .form-actions {
        display: flex;
        gap: 8px;
        margin-top: 10px;
      }

      .muted {
        color: var(--text-muted);
      }

      #bottom-nav {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 5;
        display: flex;
        gap: 8px;
        background: rgba(15, 15, 19, 0.96);
        border-top: 1px solid var(--border);
        padding: 10px;
      }

      .nav-btn {
        flex: 1;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--surface);
        color: var(--text-muted);
        padding: 10px 8px;
        cursor: pointer;
      }

      .nav-btn.active {
        color: var(--accent);
        border-color: var(--accent);
      }

      /* Notes screen */
      .notes-search-wrap {
        margin-bottom: 10px;
      }

      .notes-filters {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        padding-bottom: 10px;
        scrollbar-width: none;
      }
      .notes-filters::-webkit-scrollbar {
        display: none;
      }

      .chip {
        flex-shrink: 0;
        border: 1px solid var(--border);
        border-radius: 20px;
        background: var(--surface);
        color: var(--text-muted);
        padding: 5px 14px;
        cursor: pointer;
        font: inherit;
        font-size: 13px;
        white-space: nowrap;
      }
      .chip.active {
        color: var(--accent);
        border-color: var(--accent);
      }

      .note-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 12px;
        margin-bottom: 10px;
        cursor: pointer;
        display: flex;
        align-items: flex-start;
        gap: 10px;
      }
      .note-card:hover {
        border-color: var(--text-muted);
      }
      .note-no {
        color: var(--text-muted);
        font-size: 12px;
        flex-shrink: 0;
        padding-top: 2px;
      }
      .note-body {
        flex: 1;
        min-width: 0;
      }
      .note-title {
        font-weight: 500;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .note-title.done {
        text-decoration: line-through;
        opacity: 0.5;
      }
      .note-meta {
        font-size: 12px;
        color: var(--text-muted);
        margin-top: 4px;
      }
      .note-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        display: inline-block;
        margin-right: 4px;
        vertical-align: middle;
      }
      .note-actions {
        display: flex;
        gap: 6px;
        flex-shrink: 0;
      }

      /* Modal */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        z-index: 20;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        padding: 0 0 0 0;
      }
      .modal {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius) var(--radius) 0 0;
        padding: 20px;
        width: 100%;
        max-width: 860px;
      }
      .modal-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 14px;
      }
      .modal-title {
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <h1 class="top-title">MindDump</h1>

      <div id="screen-notes" class="screen">
        <div class="notes-search-wrap">
          <input id="notes-search" class="input" placeholder="🔍 Поиск заметок..." type="search" />
        </div>

        <div id="notes-filters" class="notes-filters"></div>

        <div id="notes-list"></div>

        <button id="new-note-btn" class="btn accent full" type="button" style="margin-top: 12px">
          + Новая заметка
        </button>
      </div>

      <div id="screen-cats" class="screen active">
        <div class="cats-wrap">
          <div id="cats-list"></div>
          <div id="new-category-slot"></div>
          <button id="new-category-btn" class="btn accent full" type="button">+ Новая категория</button>
        </div>
      </div>

      <div id="screen-settings" class="screen">
        <div class="placeholder">Раздел в разработке</div>
      </div>

      <div id="modal-overlay" class="modal-overlay" style="display: none">
        <div class="modal">
          <div class="modal-header">
            <span class="modal-title">Новая заметка</span>
            <button class="icon-btn" data-action="close-modal" type="button">✕</button>
          </div>
          <input class="input" id="modal-note-title" placeholder="Название заметки" />
          <select class="input" id="modal-note-category" style="margin-top: 10px"></select>
          <select class="input" id="modal-note-topic" style="margin-top: 10px"></select>
          <div class="form-actions" style="margin-top: 12px">
            <button class="btn accent" data-action="save-note" type="button">Сохранить</button>
            <button class="btn ghost" data-action="close-modal" type="button">Отмена</button>
          </div>
        </div>
      </div>
    </div>

    <nav id="bottom-nav">
      <button class="nav-btn" data-screen="notes" type="button">📋 Заметки</button>
      <button class="nav-btn active" data-screen="cats" type="button">🏷️ Категории</button>
      <button class="nav-btn" data-screen="settings" type="button">⚙️ Настройки</button>
    </nav>

    <script>
      const DB_NAME = "minddump-db";
      const DB_VERSION = 2;

      const CATEGORY_COLORS = [
        "#5ef5c0",
        "#7dd3fc",
        "#c4b5fd",
        "#fb7185",
        "#f59e0b",
        "#facc15",
        "#34d399",
        "#60a5fa",
      ];

      const state = {
        categories: [],
        topicsByCategory: new Map(),
        categoryOpen: new Set(),
        editCategoryId: null,
        addTopicForCategoryId: null,
        editTopicId: null,
        notes: [],
        activeFilter: "all",
        searchQuery: "",
      };

      let db = null;

      function uid() {
        if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
        return "id-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 9);
      }

      async function dbInit() {
        db = await new Promise((resolve, reject) => {
          const req = indexedDB.open(DB_NAME, DB_VERSION);
          req.onerror = () => reject(req.error);
          req.onupgradeneeded = (event) => {
            const idb = event.target.result;
            const tx = event.target.transaction;

            if (!idb.objectStoreNames.contains("categories")) {
              idb.createObjectStore("categories", { keyPath: "id" });
            }
            if (!idb.objectStoreNames.contains("topics")) {
              const s = idb.createObjectStore("topics", { keyPath: "id" });
              s.createIndex("categoryId", "categoryId", { unique: false });
            }

            if (!idb.objectStoreNames.contains("notes")) {
              const ns = idb.createObjectStore("notes", { keyPath: "id" });
              ns.createIndex("categoryId", "categoryId", { unique: false });
              ns.createIndex("topicId", "topicId", { unique: false });
              ns.createIndex("status", "status", { unique: false });
            } else {
              const ns = tx.objectStore("notes");
              if (!ns.indexNames.contains("categoryId")) {
                ns.createIndex("categoryId", "categoryId", { unique: false });
              }
              if (!ns.indexNames.contains("topicId")) {
                ns.createIndex("topicId", "topicId", { unique: false });
              }
              if (!ns.indexNames.contains("status")) {
                ns.createIndex("status", "status", { unique: false });
              }
            }

            if (!idb.objectStoreNames.contains("actions")) {
              const as = idb.createObjectStore("actions", { keyPath: "id" });
              as.createIndex("noteId", "noteId", { unique: false });
            } else {
              const as = tx.objectStore("actions");
              if (!as.indexNames.contains("noteId")) {
                as.createIndex("noteId", "noteId", { unique: false });
              }
            }
          };
          req.onsuccess = () => resolve(req.result);
        });
      }

      async function dbAdd(store, obj) {
        return new Promise((resolve, reject) => {
          const tx = db.transaction(store, "readwrite");
          const req = tx.objectStore(store).add(obj);
          req.onsuccess = () => resolve(obj);
          req.onerror = () => reject(req.error);
        });
      }

      async function dbGetAll(store) {
        return new Promise((resolve, reject) => {
          const tx = db.transaction(store, "readonly");
          const req = tx.objectStore(store).getAll();
          req.onsuccess = () => resolve(req.result || []);
          req.onerror = () => reject(req.error);
        });
      }

      async function dbGet(store, id) {
        return new Promise((resolve, reject) => {
          const tx = db.transaction(store, "readonly");
          const req = tx.objectStore(store).get(id);
          req.onsuccess = () => resolve(req.result || null);
          req.onerror = () => reject(req.error);
        });
      }

      async function dbPut(store, obj) {
        return new Promise((resolve, reject) => {
          const tx = db.transaction(store, "readwrite");
          const req = tx.objectStore(store).put(obj);
          req.onsuccess = () => resolve(obj);
          req.onerror = () => reject(req.error);
        });
      }

      async function dbDelete(store, id) {
        return new Promise((resolve, reject) => {
          const tx = db.transaction(store, "readwrite");
          const req = tx.objectStore(store).delete(id);
          req.onsuccess = () => resolve();
          req.onerror = () => reject(req.error);
        });
      }

      async function dbGetByIndex(store, indexName, value) {
        return new Promise((resolve, reject) => {
          const tx = db.transaction(store, "readonly");
          const idx = tx.objectStore(store).index(indexName);
          const req = idx.getAll(value);
          req.onsuccess = () => resolve(req.result || []);
          req.onerror = () => reject(req.error);
        });
      }

      async function getNextNoteNo() {
        const all = await dbGetAll("notes");
        if (!all.length) return 1;
        return Math.max(...all.map((n) => n.no || 0)) + 1;
      }

      async function switchScreen(target) {
        document.querySelectorAll(".screen").forEach((s) => s.classList.remove("active"));
        document.getElementById("screen-" + target).classList.add("active");
        document.querySelectorAll(".nav-btn").forEach((btn) => {
          btn.classList.toggle("active", btn.dataset.screen === target);
        });
        if (target === "notes") {
          await loadNotesData();
          await renderNotesScreen();
        }
      }

      async function loadCatsData() {
        const categories = await dbGetAll("categories");
        categories.sort((a, b) => a.name.localeCompare(b.name, "ru"));
        const topics = await dbGetAll("topics");
        const map = new Map();
        categories.forEach((c) => map.set(c.id, []));
        topics.forEach((t) => {
          if (!map.has(t.categoryId)) map.set(t.categoryId, []);
          map.get(t.categoryId).push(t);
        });
        map.forEach((arr) => arr.sort((a, b) => a.name.localeCompare(b.name, "ru")));
        state.categories = categories;
        state.topicsByCategory = map;
        categories.forEach((c) => {
          if (!state.categoryOpen.has(c.id)) state.categoryOpen.add(c.id);
        });
      }

      async function loadNotesData() {
        const notes = await dbGetAll("notes");
        notes.sort((a, b) => (b.no || 0) - (a.no || 0));
        state.notes = notes;
      }

      async function renderNotesScreen() {
        const filtersEl = document.getElementById("notes-filters");
        const cats = state.categories;
        filtersEl.innerHTML = [
          `<button type="button" class="chip ${state.activeFilter === "all" ? "active" : ""}" data-filter="all">Все</button>`,
          ...cats.map(
            (c) =>
              `<button type="button" class="chip ${state.activeFilter === c.id ? "active" : ""}" data-filter="${c.id}">
        <span class="note-dot" style="background:${c.color}"></span>${escapeHtml(c.name)}
       </button>`
          ),
          `<button type="button" class="chip ${state.activeFilter === "done" ? "active" : ""}" data-filter="done">Выполненные</button>`,
        ].join("");

        let notes = state.notes;
        if (state.activeFilter === "done") {
          notes = notes.filter((n) => n.status === "done");
        } else if (state.activeFilter !== "all") {
          notes = notes.filter((n) => n.categoryId === state.activeFilter);
        }
        if (state.searchQuery) {
          const q = state.searchQuery.toLowerCase();
          notes = notes.filter((n) => (n.title || "").toLowerCase().includes(q));
        }

        const listEl = document.getElementById("notes-list");
        if (!notes.length) {
          listEl.innerHTML = '<p class="muted">Заметок пока нет</p>';
          return;
        }

        const allActions = await dbGetAll("actions");
        const actionCount = {};
        allActions.forEach((a) => {
          actionCount[a.noteId] = (actionCount[a.noteId] || 0) + 1;
        });

        listEl.innerHTML = notes
          .map((note) => {
            const cat = state.categories.find((c) => c.id === note.categoryId);
            const topic = state.topicsByCategory.get(note.categoryId)?.find((t) => t.id === note.topicId);
            const dot = cat ? `<span class="note-dot" style="background:${cat.color}"></span>` : "";
            const catName = cat ? escapeHtml(cat.name) : "";
            const topicName = topic ? ` · ${escapeHtml(topic.name)}` : "";
            const ac = actionCount[note.id] || 0;
            const acText = ac
              ? ` · ${ac} ${ac === 1 ? "действие" : ac < 5 ? "действия" : "действий"}`
              : "";
            const date = new Date(note.createdAt).toLocaleDateString("ru", { day: "numeric", month: "short" });

            return `
      <div class="note-card" data-note-id="${note.id}">
        <div class="note-no">#${note.no}</div>
        <div class="note-body">
          <div class="note-title ${note.status === "done" ? "done" : ""}">${escapeHtml(note.title)}</div>
          <div class="note-meta">${dot}${catName}${topicName}${acText} · ${date}</div>
        </div>
        <div class="note-actions">
          <button class="icon-btn danger" data-action="delete-note" data-id="${note.id}" type="button">🗑️</button>
        </div>
      </div>
    `;
          })
          .join("");
      }

      async function openNoteModal() {
        const overlay = document.getElementById("modal-overlay");
        const catSelect = document.getElementById("modal-note-category");
        const topicSelect = document.getElementById("modal-note-topic");

        catSelect.innerHTML =
          '<option value="">— Категория —</option>' +
          state.categories.map((c) => `<option value="${c.id}">${escapeHtml(c.name)}</option>`).join("");

        topicSelect.innerHTML = '<option value="">— Тема —</option>';

        catSelect.onchange = () => {
          const catId = catSelect.value;
          const topics = state.topicsByCategory.get(catId) || [];
          topicSelect.innerHTML =
            '<option value="">— Тема —</option>' +
            topics.map((t) => `<option value="${t.id}">${escapeHtml(t.name)}</option>`).join("");
        };

        document.getElementById("modal-note-title").value = "";
        overlay.style.display = "flex";
        document.getElementById("modal-note-title").focus();
      }

      function bindNotesEvents() {
        document.getElementById("notes-search").addEventListener("input", async (e) => {
          state.searchQuery = e.target.value.trim();
          await renderNotesScreen();
        });

        document.getElementById("notes-filters").addEventListener("click", async (e) => {
          const chip = e.target.closest(".chip");
          if (!chip) return;
          state.activeFilter = chip.dataset.filter;
          await renderNotesScreen();
        });

        document.getElementById("notes-list").addEventListener("click", async (e) => {
          const deleteBtn = e.target.closest('[data-action="delete-note"]');
          if (deleteBtn) {
            const id = deleteBtn.dataset.id;
            const note = await dbGet("notes", id);
            if (!note) return;
            if (!confirm(`Удалить заметку "${note.title}"?`)) return;
            const actions = await dbGetByIndex("actions", "noteId", id);
            for (const a of actions) await dbDelete("actions", a.id);
            await dbDelete("notes", id);
            await loadNotesData();
            await renderNotesScreen();
            return;
          }
          const card = e.target.closest(".note-card");
          if (card) {
            /* openNoteDetail(card.dataset.noteId) — этап 3 */
          }
        });

        document.getElementById("new-note-btn").addEventListener("click", openNoteModal);

        document.getElementById("modal-overlay").addEventListener("click", async (e) => {
          const action = e.target.closest("[data-action]")?.dataset.action;

          if (action === "close-modal") {
            document.getElementById("modal-overlay").style.display = "none";
            return;
          }

          if (action === "save-note") {
            const title = document.getElementById("modal-note-title").value.trim();
            const categoryId = document.getElementById("modal-note-category").value;
            const topicId = document.getElementById("modal-note-topic").value;

            if (!title) {
              document.getElementById("modal-note-title").focus();
              return;
            }

            const no = await getNextNoteNo();
            await dbAdd("notes", {
              id: uid(),
              no,
              title,
              categoryId: categoryId || null,
              topicId: topicId || null,
              status: "open",
              createdAt: new Date().toISOString(),
              updatedAt: new Date().toISOString(),
            });

            document.getElementById("modal-overlay").style.display = "none";
            await loadNotesData();
            await renderNotesScreen();
          }
        });
      }

      function renderColorPicker(selectedColor) {
        return `
          <div class="colors">
            ${CATEGORY_COLORS.map((c) => {
              const active = c.toLowerCase() === selectedColor.toLowerCase() ? "active" : "";
              return `<button type="button" class="color-btn ${active}" data-color="${c}" style="background:${c}"></button>`;
            }).join("")}
          </div>
        `;
      }

      function renderCategoryInlineForm(category) {
        const isEdit = Boolean(category);
        const name = category ? category.name : "";
        const color = category ? category.color : CATEGORY_COLORS[0];
        return `
          <div class="inline-form" data-form-type="${isEdit ? "edit-category" : "new-category"}" data-id="${category ? category.id : ""}">
            <input class="input" name="name" placeholder="Название категории" value="${escapeHtml(name)}" />
            ${renderColorPicker(color)}
            <div class="form-actions">
              <button class="btn accent" data-action="save-category" type="button">Сохранить</button>
              <button class="btn ghost" data-action="cancel-category" type="button">Отмена</button>
            </div>
          </div>
        `;
      }

      function renderTopicInlineForm(categoryId, topic) {
        const isEdit = Boolean(topic);
        return `
          <div class="inline-form" data-form-type="${isEdit ? "edit-topic" : "new-topic"}" data-category-id="${categoryId}" data-topic-id="${topic ? topic.id : ""}">
            <input class="input" name="topic-name" placeholder="Название темы" value="${escapeHtml(topic ? topic.name : "")}" />
            <div class="form-actions">
              <button class="btn accent" data-action="save-topic" type="button">Сохранить</button>
              <button class="btn ghost" data-action="cancel-topic" type="button">Отмена</button>
            </div>
          </div>
        `;
      }

      function renderCatsScreen() {
        const list = document.getElementById("cats-list");
        const newCatSlot = document.getElementById("new-category-slot");
        const rows = state.categories
          .map((cat) => {
            const isOpen = state.categoryOpen.has(cat.id);
            const topics = state.topicsByCategory.get(cat.id) || [];
            const isEditingCat = state.editCategoryId === cat.id;

            const topicsHtml = topics
              .map((topic) => {
                const isEditingTopic = state.editTopicId === topic.id;
                return `
                  <div class="topic-row">
                    ${isEditingTopic
                      ? renderTopicInlineForm(cat.id, topic)
                      : `<div class="topic-name">├─ ${escapeHtml(topic.name)}</div>
                         <button class="icon-btn" data-action="edit-topic" data-id="${topic.id}" type="button">✏️</button>
                         <button class="icon-btn danger" data-action="delete-topic" data-id="${topic.id}" type="button">🗑️</button>`}
                  </div>
                `;
              })
              .join("");

            const addTopicOpen = state.addTopicForCategoryId === cat.id;
            return `
              <div class="cat-row">
                <div class="cat-header">
                  <button class="accordion-btn" data-action="toggle-cat" data-id="${cat.id}" type="button">${isOpen ? "▾" : "▸"}</button>
                  <span class="dot" style="background:${cat.color}"></span>
                  ${
                    isEditingCat
                      ? `<div style="flex:1">${renderCategoryInlineForm(cat)}</div>`
                      : `<div class="cat-name">${escapeHtml(cat.name)}</div>
                         <button class="icon-btn" data-action="edit-cat" data-id="${cat.id}" type="button">✏️</button>
                         <button class="icon-btn danger" data-action="delete-cat" data-id="${cat.id}" type="button">🗑️</button>`
                  }
                </div>
                ${isOpen ? `<div class="cat-body">${topicsHtml}
                  ${addTopicOpen ? renderTopicInlineForm(cat.id, null) : ""}
                  <div style="margin-top:8px">
                    <button class="btn link" data-action="add-topic" data-id="${cat.id}" type="button">+ Добавить тему</button>
                  </div>
                </div>` : ""}
              </div>
            `;
          })
          .join("");
        list.innerHTML = rows || `<p class="muted">Категорий пока нет</p>`;
        newCatSlot.innerHTML = state.editCategoryId === "new" ? renderCategoryInlineForm(null) : "";
      }

      function bindCatsEvents() {
        const catsRoot = document.getElementById("screen-cats");

        catsRoot.addEventListener("click", async (e) => {
          const target = e.target.closest("[data-action]");
          if (!target) {
            const colorBtn = e.target.closest(".color-btn");
            if (colorBtn) {
              const form = colorBtn.closest(".inline-form");
              form.querySelectorAll(".color-btn").forEach((b) => b.classList.remove("active"));
              colorBtn.classList.add("active");
            }
            return;
          }

          const action = target.dataset.action;
          const id = target.dataset.id;

          if (action === "toggle-cat") {
            if (state.categoryOpen.has(id)) state.categoryOpen.delete(id);
            else state.categoryOpen.add(id);
            renderCatsScreen();
            return;
          }

          if (action === "edit-cat") {
            state.editCategoryId = id;
            state.editTopicId = null;
            state.addTopicForCategoryId = null;
            renderCatsScreen();
            return;
          }

          if (action === "delete-cat") {
            const cat = await dbGet("categories", id);
            if (!cat) return;
            if (!confirm(`Удалить категорию "${cat.name}" и все её темы?`)) return;
            const topics = await dbGetByIndex("topics", "categoryId", id);
            for (const t of topics) await dbDelete("topics", t.id);
            await dbDelete("categories", id);
            state.editCategoryId = null;
            state.addTopicForCategoryId = null;
            state.editTopicId = null;
            await loadCatsData();
            renderCatsScreen();
            return;
          }

          if (action === "add-topic") {
            state.addTopicForCategoryId = id;
            state.editTopicId = null;
            renderCatsScreen();
            return;
          }

          if (action === "edit-topic") {
            state.editTopicId = id;
            state.addTopicForCategoryId = null;
            renderCatsScreen();
            return;
          }

          if (action === "delete-topic") {
            const topic = await dbGet("topics", id);
            if (!topic) return;
            if (!confirm(`Удалить тему "${topic.name}"?`)) return;
            await dbDelete("topics", id);
            state.editTopicId = null;
            await loadCatsData();
            renderCatsScreen();
            return;
          }

          if (action === "cancel-category") {
            state.editCategoryId = null;
            renderCatsScreen();
            return;
          }

          if (action === "save-category") {
            const form = target.closest(".inline-form");
            const idFromForm = form.dataset.id;
            const input = form.querySelector('input[name="name"]');
            const activeColorBtn = form.querySelector(".color-btn.active");
            const name = input.value.trim();
            if (!name) {
              input.focus();
              return;
            }
            const color = activeColorBtn ? activeColorBtn.dataset.color : CATEGORY_COLORS[0];
            if (idFromForm) {
              const current = await dbGet("categories", idFromForm);
              if (!current) return;
              await dbPut("categories", { ...current, name, color });
            } else {
              await dbAdd("categories", {
                id: uid(),
                name,
                color,
                createdAt: new Date().toISOString(),
              });
              state.editCategoryId = null;
            }
            await loadCatsData();
            state.editCategoryId = null;
            renderCatsScreen();
            return;
          }

          if (action === "cancel-topic") {
            state.addTopicForCategoryId = null;
            state.editTopicId = null;
            renderCatsScreen();
            return;
          }

          if (action === "save-topic") {
            const form = target.closest(".inline-form");
            const categoryId = form.dataset.categoryId;
            const topicId = form.dataset.topicId;
            const input = form.querySelector('input[name="topic-name"]');
            const name = input.value.trim();
            if (!name) {
              input.focus();
              return;
            }
            if (topicId) {
              const current = await dbGet("topics", topicId);
              if (!current) return;
              await dbPut("topics", { ...current, name });
            } else {
              await dbAdd("topics", {
                id: uid(),
                name,
                categoryId,
                createdAt: new Date().toISOString(),
              });
            }
            state.addTopicForCategoryId = null;
            state.editTopicId = null;
            await loadCatsData();
            renderCatsScreen();
          }
        });

        document.getElementById("new-category-btn").addEventListener("click", () => {
          state.editCategoryId = "new";
          state.editTopicId = null;
          state.addTopicForCategoryId = null;
          renderCatsScreen();
        });
      }

      function bindNavEvents() {
        document.querySelectorAll(".nav-btn").forEach((btn) => {
          btn.addEventListener("click", async () => {
            await switchScreen(btn.dataset.screen);
          });
        });
      }

      function escapeHtml(s) {
        return String(s)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }

      async function start() {
        try {
          await dbInit();
          await loadCatsData();
          renderCatsScreen();
          bindCatsEvents();
          bindNotesEvents();
          bindNavEvents();
        } catch (err) {
          console.error(err);
          alert("Ошибка инициализации приложения. Подробности в консоли.");
        }
      }

      start();
    </script>
  </body>
</html>
